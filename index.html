<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CapySpace - Соцсеть для капибар</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- Экран авторизации -->
    <div id="auth-screen" class="screen active">
      <div class="auth-container">
        <div class="capybara-icon">🦫</div>
        <h1>CapySpace</h1>
        <p class="subtitle">Социальная сеть для капибар</p>
        
        <div id="login-form">
          <input type="text" id="login-username" placeholder="Имя капибары" maxlength="20">
          <input type="password" id="login-password" placeholder="Пароль" maxlength="30">
          <button onclick="login()">Войти в норку 🏠</button>
        </div>
        
        <div id="register-form" style="display:none;">
          <input type="text" id="reg-username" placeholder="Придумай имя" maxlength="20">
          <input type="password" id="reg-password" placeholder="Пароль" maxlength="30">
          <input type="text" id="reg-bio" placeholder="О себе (необязательно)" maxlength="100">
          <button onclick="register()">Создать норку ✨</button>
        </div>
        
        <p class="toggle-form">
          <span onclick="toggleAuthForm()">
            <span id="toggle-text">Нет норки? Зарегистрируйся!</span>
          </span>
        </p>
      </div>
    </div>

    <!-- Основной экран -->
    <div id="main-screen" class="screen">
      <header>
        <div class="header-left">
          <span class="logo">🦫 CapySpace</span>
        </div>
        <div class="header-right">
          <span id="current-user" onclick="showProfile()"></span>
          <button onclick="logout()" class="logout-btn">🚪</button>
        </div>
      </header>

      <div class="main-container">
        <!-- Боковая панель -->
        <aside class="sidebar">
          <div class="profile-card">
            <div class="avatar-large" id="profile-avatar">🦫</div>
            <h3 id="profile-name"></h3>
            <p id="profile-bio"></p>
            <div class="stats">
              <span>Посты: <strong id="posts-count">0</strong></span>
              <span>Подписки: <strong id="subs-count">0</strong></span>
            </div>
            <button onclick="editProfile()" class="edit-btn">Редактировать ✏️</button>
          </div>

          <div class="search-box">
            <input type="text" id="search-input" placeholder="Искать капибар..." oninput="searchUsers()">
            <div id="search-results"></div>
          </div>
        </aside>

        <!-- Лента -->
        <main class="feed">
          <!-- Форма создания поста -->
          <div class="post-creator">
            <textarea id="post-content" placeholder="Что нового, капибара? 🦫" maxlength="280"></textarea>
            <div class="post-actions">
              <input type="file" id="image-upload" accept="image/*" style="display:none">
              <button onclick="document.getElementById('image-upload').click()" class="attach-btn">📸</button>
              <button onclick="createPost()" class="post-btn">Плюхнуть в ленту! 🌊</button>
            </div>
            <div id="image-preview"></div>
          </div>

          <!-- Посты -->
          <div id="posts-feed"></div>
        </main>
      </div>
    </div>

    <!-- Модальное окно профиля -->
    <div id="profile-modal" class="modal">
      <div class="modal-content">
        <span class="close" onclick="closeProfile()">&times;</span>
        <div class="profile-detail">
          <div class="avatar-xlarge" id="modal-avatar">🦫</div>
          <h2 id="modal-name"></h2>
          <p id="modal-bio"></p>
          <div class="modal-stats">
            <span>Посты: <strong id="modal-posts">0</strong></span>
            <span>Подписчики: <strong id="modal-followers">0</strong></span>
          </div>
          <button id="follow-btn" onclick="toggleFollow()">Подписаться 💕</button>
          <div id="modal-posts-feed"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-storage-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="app.js"></script>
</body>
            </html>
