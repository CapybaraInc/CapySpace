<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CapySpace — Социальная сеть для капибар</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js">
    </script>
    <style>
        /* ===== СТИЛИ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            min-height: 600px;
            position: relative;
        }
        .hidden {
            display: none !important;
        }
        .logo {
            text-align: center;
            font-size: 60px;
            margin-bottom: 10px;
        }
        h1 {
            text-align: center;
            color: #333;
            font-size: 28px;
            margin-bottom: 6px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            font-size: 12px;
            color: #555;
            margin-bottom: 4px;
        }
        .input-group input,
        .input-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }
        .input-group input:focus,
        .input-group textarea:focus {
            border-color: #667eea;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 10px;
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-primary:hover {
            background: #5a6fd6;
        }
        .btn-secondary {
            background: #eee;
            color: #333;
        }
        .btn-secondary:hover {
            background: #ddd;
        }
        .btn-danger {
            background: #e74c3c;
            color: white;
        }
        .btn-danger:hover {
            background: #c0392b;
        }
        .error {
            color: #e74c3c;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }
        .success {
            color: #2ecc71;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }
        .toggle-link {
            color: #667eea;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
            display: inline-block;
        }
        .toggle-link:hover {
            text-decoration: underline;
        }

        /* Лента */
        .post {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .post-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .post-avatar {
            font-size: 30px;
        }
        .post-user {
            font-weight: bold;
            color: #333;
        }
        .post-time {
            font-size: 12px;
            color: #999;
        }
        .post-text {
            margin: 8px 0;
        }
        .post-image {
            width: 100%;
            border-radius: 8px;
            margin: 8px 0;
        }
        .post-actions-bar {
            display: flex;
            gap: 15px;
            margin-top: 8px;
        }
        .post-actions-bar button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            color: #555;
        }
        .like-btn.liked {
            color: #e74c3c;
        }
        .comments-section {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #eee;
        }
        .comment {
            padding: 5px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .comment-user {
            font-weight: bold;
            color: #333;
        }
        .comment-input {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .comment-input input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .comment-input button {
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        /* Поиск */
        #search-input {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .search-result {
            padding: 10px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }
        .search-result:hover {
            background: #f0f0f0;
        }

        /* Модальное окно */
        #profile-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        #profile-modal .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
        }
        #profile-modal .modal-avatar {
            font-size: 60px;
            text-align: center;
        }
        #profile-modal .modal-name {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            margin: 10px 0;
        }
        #profile-modal .modal-bio {
            text-align: center;
            color: #666;
        }
        #profile-modal .modal-stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 15px 0;
        }
        #profile-modal .modal-stats span {
            text-align: center;
        }
        #profile-modal .modal-stats .count {
            font-size: 20px;
            font-weight: bold;
        }
        #profile-modal .modal-stats .label {
            font-size: 12px;
            color: #666;
        }
        #profile-modal .modal-posts-feed {
            margin-top: 15px;
        }
        #follow-btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px 0;
        }
        #follow-btn.following {
            background: #e74c3c;
            color: white;
        }
        #follow-btn.not-following {
            background: #667eea;
            color: white;
        }

        /* Создание поста */
        #post-content {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            resize: vertical;
            min-height: 60px;
        }
        #image-upload {
            margin: 8px 0;
        }
        #image-preview img {
            max-width: 100%;
            border-radius: 8px;
            margin: 8px 0;
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- ===== ЭКРАН АВТОРИЗАЦИИ ===== -->
        <div id="auth-screen">
            <div class="logo">🦫</div>
            <h1>CapySpace</h1>
            <div class="subtitle">Социальная сеть для капибар</div>

            <!-- Вход -->
            <div id="login-form">
                <div class="input-group">
                    <label>Имя капибары</label>
                    <input type="text" id="login-username" placeholder="твоё имя">
                </div>
                <div class="input-group">
                    <label>Пароль</label>
                    <input type="password" id="login-password" placeholder="******">
                </div>
                <button class="btn btn-primary" id="login-btn">Войти в норку 🏠</button>
                <span class="toggle-link" id="toggle-login">Нет норки? Зарегистрируйся!</span>
            </div>

            <!-- Регистрация -->
            <div id="register-form" class="hidden">
                <div class="input-group">
                    <label>Имя капибары</label>
                    <input type="text" id="reg-username" placeholder="твоё имя">
                </div>
                <div class="input-group">
                    <label>Пароль</label>
                    <input type="password" id="reg-password" placeholder="******">
                </div>
                <div class="input-group">
                    <label>Расскажи о себе</label>
                    <textarea id="reg-bio" placeholder="Люблю траву и плавать"></textarea>
                </div>
                <button class="btn btn-primary" id="register-btn">Создать норку ✨</button>
                <span class="toggle-link" id="toggle-register">Уже есть норка? Войди!</span>
            </div>
        </div>

        <!-- ===== ГЛАВНЫЙ ЭКРАН ===== -->
        <div id="main-screen" class="hidden">

            <!-- Профиль -->
            <div style="text-align: center; margin-bottom: 15px;">
                <div style="font-size: 50px;" id="profile-avatar">🦫</div>
                <div style="font-size: 20px; font-weight: bold;" id="profile-name">Капибара</div>
                <div style="color: #666; font-size: 14px;" id="profile-bio">Люблю траву и плавать</div>
                <div style="display: flex; justify-content: center; gap: 20px; margin: 10px 0;">
                    <span><span id="posts-count">0</span> постов</span>
                    <span><span id="subs-count">0</span> подписок</span>
                </div>
                <button class="btn btn-secondary" onclick="editProfile()" style="width: auto; padding: 5px 15px;">
                    ✏️ Редактировать
                </button>
                <button class="btn btn-danger" onclick="logout()" style="width: auto; padding: 5px 15px;">
                    🚪 Выйти
                </button>
            </div>

            <!-- Поиск -->
            <div style="margin-bottom: 15px;">
                <input type="text" id="search-input" placeholder="🔍 Поиск капибар...">
                <div id="search-results"></div>
            </div>

            <!-- Создание поста -->
            <div style="margin-bottom: 15px;">
                <textarea id="post-content" placeholder="Что у тебя нового, капибара?"></textarea>
                <div id="image-preview"></div>
                <input type="file" id="image-upload" accept="image/*">
                <button class="btn btn-primary" onclick="createPost()">Опубликовать 🦫</button>
            </div>

            <!-- Лента -->
            <div id="posts-feed"></div>
        </div>

        <!-- ===== МОДАЛЬНОЕ ОКНО ПРОФИЛЯ ===== -->
        <div id="profile-modal">
            <div class="modal-content">
                <div class="modal-avatar">🦫</div>
                <div class="modal-name">Капибара</div>
                <div class="modal-bio">Люблю траву и плавать</div>
                <div class="modal-stats">
                    <span><span class="count" id="modal-posts">0</span><br><span class="label">постов</span></span>
                    <span><span class="count" id="modal-followers">0</span><br><span class="label">подписчиков</span></span>
                </div>
                <button id="follow-btn" class="not-following" onclick="toggleFollow()">Подписаться 💕</button>
                <div id="modal-posts-feed"></div>
                <button class="btn btn-secondary" onclick="closeProfile()">Закрыть</button>
            </div>
        </div>

    </div>

    <!-- Firebase SDK (уже есть в head) -->

    <script>
        // ===== ТВОЙ КОНФИГ FIREBASE =====
        const firebaseConfig = {
            apiKey: "AIzaSyCDqJL5NZ7pSXzjCrL6LtxkPPhetDOeqI4",
            authDomain: "capyspace-f7e08.firebaseapp.com",
            projectId: "capyspace-f7e08",
            storageBucket: "capyspace-f7e08.firebasestorage.app",
            messagingSenderId: "303562964425",
            appId: "1:303562964425:web:84be04f79d102a1144fc18",
            measurementId: "G-JNLGZG4Q56"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const storage = firebase.storage();

        // ===== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ =====
        let currentUser = null;
        let viewingProfile = null;
        let userLikes = new Set();

        // ===== АВТОРИЗАЦИЯ =====
        window.onload = () => {
            firebase.auth().onAuthStateChanged((user) => {
                if (user) {
                    currentUser = user;
                    loadMainScreen();
                }
            });
        };

        function toggleAuthForm() {
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            const toggleText = document.getElementById('toggle-login');

            if (loginForm.style.display === 'none') {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                toggleText.textContent = 'Нет норки? Зарегистрируйся!';
            } else {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                toggleText.textContent = 'Уже есть норка? Войди!';
            }
        }

        document.getElementById('toggle-login').addEventListener('click', toggleAuthForm);
        document.getElementById('toggle-register').addEventListener('click', toggleAuthForm);

        function register() {
            const username = document.getElementById('reg-username').value;
            const password = document.getElementById('reg-password').value;
            const bio = document.getElementById('reg-bio').value;

            if (!username || !password) {
                alert('Заполни имя и пароль!');
                return;
            }

            const email = `${username}@capyspace.com`;

            firebase.auth().createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    const user = userCredential.user;
                    return db.ref('users/' + user.uid).set({
                        username: username,
                        bio: bio,
                        avatar: '🦫',
                        followers: 0,
                        following: 0,
                        posts: 0
                    });
                })
                .then(() => {
                    alert('Аккаунт создан!');
                })
                .catch((error) => {
                    alert('Ошибка: ' + error.message);
                });
        }

        document.getElementById('register-btn').addEventListener('click', register);

        function login() {
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;

            if (!username || !password) {
                alert('Заполни все поля!');
                return;
            }

            const email = `${username}@capyspace.com`;

            firebase.auth().signInWithEmailAndPassword(email, password)
                .catch((error) => {
                    alert('Ошибка: ' + error.message);
                });
        }

        document.getElementById('login-btn').addEventListener('click', login);

        function logout() {
            firebase.auth().signOut();
            currentUser = null;
            document.getElementById('auth-screen').classList.remove('hidden');
            document.getElementById('main-screen').classList.add('hidden');
        }

        // ===== ЗАГРУЗКА ГЛАВНОГО ЭКРАНА =====
        function loadMainScreen() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');

            loadUserProfile();
            loadFeed();
        }

        function loadUserProfile() {
            db.ref('users/' + currentUser.uid).once('value')
                .then((snapshot) => {
                    const userData = snapshot.val();
                    document.getElementById('profile-avatar').textContent = userData.avatar || '🦫';
                    document.getElementById('profile-name').textContent = userData.username;
                    document.getElementById('profile-bio').textContent = userData.bio || '';
                    document.getElementById('posts-count').textContent = userData.posts || 0;
                    document.getElementById('subs-count').textContent = userData.following || 0;
                });
        }

        // ===== СОЗДАНИЕ ПОСТА =====
        function createPost() {
            const content = document.getElementById('post-content').value;
            const imageFile = document.getElementById('image-upload').files[0];

            if (!content && !imageFile) {
                alert('Напиши что-нибудь или добавь фото!');
                return;
            }

            const postRef = db.ref('posts').push();
            const postData = {
                userId: currentUser.uid,
                username: document.getElementById('profile-name').textContent,
                avatar: document.getElementById('profile-avatar').textContent,
                content: content,
                timestamp: firebase.database.ServerValue.TIMESTAMP,
                likes: 0,
                comments: 0
            };

            if (imageFile) {
                const storageRef = storage.ref('posts/' + postRef.key);
                storageRef.put(imageFile).then((snapshot) => {
                    snapshot.ref.getDownloadURL().then((url) => {
                        postData.imageUrl = url;
                        postRef.set(postData);
                        db.ref('users/' + currentUser.uid + '/posts')
                            .transaction((posts) => (posts || 0) + 1);
                        document.getElementById('post-content').value = '';
                        document.getElementById('image-upload').value = '';
                        document.getElementById('image-preview').innerHTML = '';
                    });
                });
            } else {
                postRef.set(postData);
                db.ref('users/' + currentUser.uid + '/posts')
                    .transaction((posts) => (posts || 0) + 1);
                document.getElementById('post-content').value = '';
            }
        }

        // ===== ЛЕНТА =====
        function loadFeed() {
            const feedElement = document.getElementById('posts-feed');

            db.ref('posts').orderByChild('timestamp').limitToLast(50).on('value', (snapshot) => {
                feedElement.innerHTML = '';
                const posts = [];
                snapshot.forEach((child) => {
                    posts.unshift({ id: child.key, ...child.val() });
                });
                posts.forEach((post) => {
                    displayPost(post);
                });
            });
        }

        function displayPost(post) {
            const feedElement = document.getElementById('posts-feed');
            const postElement = document.createElement('div');
            postElement.className = 'post';
            postElement.id = `post-${post.id}`;

            const time = new Date(post.timestamp).toLocaleString('ru-RU');

            postElement.innerHTML = `
                <div class="post-header">
                    <span class="post-avatar">${post.avatar}</span>
                    <div>
                        <span class="post-user">${post.username}</span>
                        <div class="post-time">${time}</div>
                    </div>
                </div>
                <div class="post-text">${post.content || ''}</div>
                ${post.imageUrl ? `<img src="${post.imageUrl}" class="post-image">` : ''}
                <div class="post-actions-bar">
                    <button class="like-btn ${isLiked(post.id) ? 'liked' : ''}" onclick="toggleLike('${post.id}')">
                        ❤️ <span id="likes-${post.id}">${post.likes || 0}</span>
                    </button>
                    <button class="comment-btn" onclick="toggleComments('${post.id}')">
                        💬 <span>${post.comments || 0}</span>
                    </button>
                </div>
                <div class="comments-section" id="comments-${post.id}" style="display:none;">
                    <div id="comments-list-${post.id}"></div>
                    <div class="comment-input">
                        <input type="text" id="comment-input-${post.id}" placeholder="Написать комментарий...">
                        <button onclick="addComment('${post.id}')">Отправить</button>
                    </div>
                </div>
            `;

            feedElement.insertBefore(postElement, feedElement.firstChild);
        }

        // ===== ЛАЙКИ =====
        function isLiked(postId) {
            return userLikes.has(postId);
        }

        function toggleLike(postId) {
            const likesRef = db.ref('posts/' + postId + '/likes');

            if (isLiked(postId)) {
                userLikes.delete(postId);
                likesRef.transaction((likes) => (likes || 0) - 1);
            } else {
                userLikes.add(postId);
                likesRef.transaction((likes) => (likes || 0) + 1);
            }

            const likeBtn = document.querySelector(`#post-${postId} .like-btn`);
            likeBtn.classList.toggle('liked');
        }

        // ===== КОММЕНТАРИИ =====
        function toggleComments(postId) {
            const commentsSection = document.getElementById(`comments-${postId}`);
            const isVisible = commentsSection.style.display !== 'none';

            if (isVisible) {
                commentsSection.style.display = 'none';
            } else {
                commentsSection.style.display = 'block';
                loadComments(postId);
            }
        }

        function loadComments(postId) {
            const commentsList = document.getElementById(`comments-list-${postId}`);

            db.ref('comments/' + postId).on('value', (snapshot) => {
                commentsList.innerHTML = '';
                const comments = [];
                snapshot.forEach((child) => {
                    comments.push({ id: child.key, ...child.val() });
                });
                comments.forEach((comment) => {
                    const commentElement = document.createElement('div');
                    commentElement.className = 'comment';
                    commentElement.innerHTML = `
                        <span class="comment-user">${comment.username}</span>
                        <span>${comment.text}</span>
                    `;
                    commentsList.appendChild(commentElement);
                });
            });
        }

        function addComment(postId) {
            const commentInput = document.getElementById(`comment-input-${postId}`);
            const text = commentInput.value;

            if (!text) return;

            const commentRef = db.ref('comments/' + postId).push();
            commentRef.set({
                userId: currentUser.uid,
                username: document.getElementById('profile-name').textContent,
                text: text,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });

            db.ref('posts/' + postId + '/comments')
                .transaction((comments) => (comments || 0) + 1);

            commentInput.value = '';
        }

        // ===== ПОИСК ПОЛЬЗОВАТЕЛЕЙ =====
        function searchUsers() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const resultsContainer = document.getElementById('search-results');

            if (searchTerm.length < 2) {
                resultsContainer.innerHTML = '';
                return;
            }

            db.ref('users').once('value')
                .then((snapshot) => {
                    resultsContainer.innerHTML = '';
                    snapshot.forEach((child) => {
                        const user = child.val();
                        if (user.username.toLowerCase().includes(searchTerm)) {
                            const resultElement = document.createElement('div');
                            resultElement.className = 'search-result';
                            resultElement.innerHTML = `
                                <span style="font-size: 30px; margin-right: 10px;">${user.avatar || '🦫'}</span>
                                <span>${user.username}</span>
                            `;
                            resultElement.onclick = () => showUserProfile(child.key);
                            resultsContainer.appendChild(resultElement);
                        }
                    });
                });
        }

        document.getElementById('search-input').addEventListener('input', searchUsers);

        // ===== ПРОСМОТР ПРОФИЛЯ =====
        function showUserProfile(userId) {
            viewingProfile = userId;
            const modal = document.getElementById('profile-modal');

            db.ref('users/' + userId).once('value')
                .then((snapshot) => {
                    const user = snapshot.val();
                    document.getElementById('modal-avatar').textContent = user.avatar || '🦫';
                    document.getElementById('modal-name').textContent = user.username;
                    document.getElementById('modal-bio').textContent = user.bio || '';
                    document.getElementById('modal-posts').textContent = user.posts || 0;
                    document.getElementById('modal-followers').textContent = user.followers || 0;

                    const followBtn = document.getElementById('follow-btn');
                    if (userId === currentUser.uid) {
                        followBtn.style.display = 'none';
                    } else {
                        followBtn.style.display = 'block';
                        checkIfFollowing(userId);
                    }
                });

            loadUserPosts(userId);
            modal.style.display = 'flex';
        }

        function checkIfFollowing(userId) {
            db.ref('followers/' + currentUser.uid + '/' + userId).once('value')
                .then((snapshot) => {
                    const followBtn = document.getElementById('follow-btn');
                    if (snapshot.exists()) {
                        followBtn.textContent = 'Отписаться 💔';
                        followBtn.className = 'following';
                    } else {
                        followBtn.textContent = 'Подписаться 💕';
                        followBtn.className = 'not-following';
                    }
                });
        }

        function toggleFollow() {
            if (!viewingProfile || viewingProfile === currentUser.uid) return;

            const followRef = db.ref('followers/' + currentUser.uid + '/' + viewingProfile);

            followRef.once('value')
                .then((snapshot) => {
                    if (snapshot.exists()) {
                        followRef.remove();
                        db.ref('users/' + viewingProfile + '/followers')
                            .transaction((followers) => (followers || 0) - 1);
                        db.ref('users/' + currentUser.uid + '/following')
                            .transaction((following) => (following || 0) - 1);
                    } else {
                        followRef.set(true);
                        db.ref('users/' + viewingProfile + '/followers')
                            .transaction((followers) => (followers || 0) + 1);
                        db.ref('users/' + currentUser.uid + '/following')
                            .transaction((following) => (following || 0) + 1);
                    }
                    showUserProfile(viewingProfile);
                });
        }

        document.getElementById('follow-btn').addEventListener('click', toggleFollow);

        function loadUserPosts(userId) {
            const modalFeed = document.getElementById('modal-posts-feed');

            db.ref('posts').orderByChild('userId').equalTo(userId).on('value', (snapshot) => {
                modalFeed.innerHTML = '';
                const posts = [];
                snapshot.forEach((child) => {
                    posts.push({ id: child.key, ...child.val() });
                });
                posts.reverse().forEach((post) => {
                    const postElement = document.createElement('div');
                    postElement.className = 'post';
                    postElement.innerHTML = `
                        <div class="post-text">${post.content || ''}</div>
                        ${post.imageUrl ? `<img src="${post.imageUrl}" class="post-image">` : ''}
                        <div class="post-time">${new Date(post.timestamp).toLocaleString('ru-RU')}</div>
                    `;
                    modalFeed.appendChild(postElement);
                });
            });
        }

        function closeProfile() {
            document.getElementById('profile-modal').style.display = 'none';
            viewingProfile = null;
        }

        // ===== РЕДАКТИРОВАНИЕ ПРОФИЛЯ =====
        function editProfile() {
            const newBio = prompt('Расскажи о себе:', document.getElementById('profile-bio').textContent);
            if (newBio !== null) {
                db.ref('users/' + currentUser.uid + '/bio').set(newBio);
                loadUserProfile();
            }
        }

        // ===== ПРЕДПРОСМОТР ФОТО =====
        document.getElementById('image-upload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('image-preview').innerHTML =
                        `<img src="${e.target.result}" alt="Preview">`;
                };
                reader.readAsDataURL(file);
            }
        });

        // ===== ЗАКРЫТИЕ МОДАЛЬНОГО ОКНА =====
        window.onclick = (event) => {
            const modal = document.getElementById('profile-modal');
            if (event.target === modal) {
                closeProfile();
            }
        };
    </script>
</body>
</html>
